<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="صورة افتراضية لمعلمة">
  <defs>
    <linearGradient id="tf-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="tf-hijab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="99" fill="url(#tf-bg)"/>
  <circle cx="100" cy="100" r="96.5" fill="none" stroke="#E8C76A" stroke-opacity="0.55" stroke-width="2.5"/>

  <!-- hijab silhouette draping to shoulders -->
  <path d="M100,38 C63,38 44,68 44,104 C44,142 54,175 62,201 L138,201 C146,175 156,142 156,104 C156,68 137,38 100,38 Z" fill="url(#tf-hijab)"/>

  <!-- inner face -->
  <ellipse cx="100" cy="96" rx="27" ry="32" fill="#4c1d95" fill-opacity="0.85"/>

  <!-- gold trim along the hijab edge -->
  <path d="M62,201 C56,178 48,144 48,104 C48,70 65,42 100,42" fill="none" stroke="#E8C76A" stroke-opacity="0.7" stroke-width="2.5" stroke-linecap="round"/>
</svg>
